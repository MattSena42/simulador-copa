<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa do Mundo - App Moderno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
    </style>
</head>

<body class="min-h-screen p-8 flex justify-center items-start font-sans">
    <div class="max-w-2xl w-full bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-bold text-yellow-400 mb-6 text-center">Simulador da Copa</h1>

        <div id="setup-section" class="mb-6">
            <label class="block text-sm font-medium mb-2">Nome da Seleção:</label>
            <input type="text" id="teamName"
                class="w-full p-3 rounded bg-slate-900 border border-slate-600 focus:border-yellow-400 outline-none mb-4"
                placeholder="Ex: Brasil">
        </div>

        <div id="input-section" class="bg-slate-700 p-6 rounded-lg mb-6">
            <h2 class="text-xl font-semibold mb-4" id="match-counter">Registrar Jogo 1</h2>
            <div class="flex gap-4 items-center">
                <div class="flex-1">
                    <label class="block text-xs mb-1">Gols da Seleção</label>
                    <input type="number" id="goalsScored" class="w-full p-2 rounded bg-slate-900 text-center" min="0"
                        value="0">
                </div>
                <span class="text-2xl font-bold text-slate-400">X</span>
                <div class="flex-1">
                    <label class="block text-xs mb-1">Gols do Adversário</label>
                    <input type="number" id="goalsConceded" class="w-full p-2 rounded bg-slate-900 text-center" min="0"
                        value="0">
                </div>
            </div>
            <button onclick="addMatch()"
                class="mt-4 w-full bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-4 rounded transition-colors">
                Adicionar Resultado
            </button>
        </div>

        <div id="match-history" class="space-y-3 mb-6"></div>

        <div id="advanced-stats" class="hidden bg-slate-900 p-6 rounded-lg border border-yellow-500">
            <h2 class="text-2xl font-bold text-yellow-400 mb-4 text-center">Resumo da Fase de Grupos</h2>
            <div class="grid grid-cols-2 gap-4 text-sm" id="stats-grid">
            </div>
            <div id="final-classification" class="mt-6 text-center text-lg font-bold p-3 rounded"></div>
        </div>
    </div>

    <script>
        const state = {
            team: '',
            matches: []
        };

        function calculateMatchResult(scored, conceded) {
            const diff = scored - conceded;
            let pts = 0, result = '', situation = '';

            if (diff > 0) { pts = 3; result = 'Vitória'; situation = 'Excelente campanha'; }
            else if (diff === 0) { pts = 1; result = 'Empate'; situation = 'Ainda pode classificar'; }
            else { pts = 0; result = 'Derrota'; situation = 'Precisa vencer a próxima partida'; }

            return { scored, conceded, diff, pts, result, situation };
        }

        function addMatch() {
            if (state.matches.length >= 3) return;

            if (!state.team) {
                const teamInput = document.getElementById('teamName').value.trim();
                if (!teamInput) { alert("Informe o nome da seleção primeiro!"); return; }
                state.team = teamInput;
                document.getElementById('teamName').disabled = true;
            }

            const scored = parseInt(document.getElementById('goalsScored').value) || 0;
            const conceded = parseInt(document.getElementById('goalsConceded').value) || 0;

            const matchData = calculateMatchResult(scored, conceded);
            state.matches.push(matchData);

            updateHistoryUI(matchData);

            if (state.matches.length < 3) {
                document.getElementById('match-counter').innerText = `Registrar Jogo ${state.matches.length + 1}`;
                document.getElementById('goalsScored').value = 0;
                document.getElementById('goalsConceded').value = 0;
            } else {
                document.getElementById('input-section').classList.add('hidden');
                generateAdvancedStats();
            }
        }

        function updateHistoryUI(match) {
            const historyDiv = document.getElementById('match-history');
            const color = match.pts === 3 ? 'text-green-400' : match.pts === 1 ? 'text-yellow-400' : 'text-red-400';

            historyDiv.innerHTML += `
                <div class="p-3 bg-slate-800 border border-slate-600 rounded flex justify-between items-center text-sm">
                    <div>
                        <span class="font-bold ${color}">${match.result}</span> 
                        (${match.scored} x ${match.conceded})
                    </div>
                    <div class="text-right">
                        <div>Pts: <span class="font-bold">${match.pts}</span> | Saldo: ${match.diff > 0 ? '+' + match.diff : match.diff}</div>
                        <div class="text-xs text-slate-400">${match.situation}</div>
                    </div>
                </div>
            `;
        }

        function generateAdvancedStats() {
            const totalPts = state.matches.reduce((acc, curr) => acc + curr.pts, 0);
            const totalScored = state.matches.reduce((acc, curr) => acc + curr.scored, 0);
            const totalConceded = state.matches.reduce((acc, curr) => acc + curr.conceded, 0);
            const totalDiff = totalScored - totalConceded;

            const wins = state.matches.filter(m => m.pts === 3).length;
            const draws = state.matches.filter(m => m.pts === 1).length;
            const losses = state.matches.filter(m => m.pts === 0).length;

            document.getElementById('stats-grid').innerHTML = `
                <div><span class="text-slate-400">Total de Pontos:</span> <strong class="text-xl">${totalPts}</strong></div>
                <div><span class="text-slate-400">Saldo de Gols:</span> <strong class="text-xl">${totalDiff > 0 ? '+' + totalDiff : totalDiff}</strong></div>
                <div><span class="text-slate-400">Gols Marcados:</span> <strong>${totalScored}</strong></div>
                <div><span class="text-slate-400">Vitórias:</span> <strong class="text-green-400">${wins}</strong></div>
                <div><span class="text-slate-400">Gols Sofridos:</span> <strong>${totalConceded}</strong></div>
                <div><span class="text-slate-400">Empates:</span> <strong class="text-yellow-400">${draws}</strong></div>
                <div><span class="text-slate-400">Aproveitamento:</span> <strong>${Math.round((totalPts / 9) * 100)}%</strong></div>
                <div><span class="text-slate-400">Derrotas:</span> <strong class="text-red-400">${losses}</strong></div>
            `;

            const classifDiv = document.getElementById('final-classification');
            if (totalPts >= 7) {
                classifDiv.className = "mt-6 text-center text-lg font-bold p-3 rounded bg-green-600/20 text-green-400 border border-green-600";
                classifDiv.innerText = "CLASSIFICADA COM EXCELENTE CAMPANHA!";
            } else if (totalPts >= 4) {
                classifDiv.className = "mt-6 text-center text-lg font-bold p-3 rounded bg-yellow-600/20 text-yellow-400 border border-yellow-600";
                classifDiv.innerText = "PODE SE CLASSIFICAR (Depende de critérios)";
            } else {
                classifDiv.className = "mt-6 text-center text-lg font-bold p-3 rounded bg-red-600/20 text-red-400 border border-red-600";
                classifDiv.innerText = "ELIMINADA.";
            }

            document.getElementById('advanced-stats').classList.remove('hidden');
        }
    </script>
</body>

</html>
